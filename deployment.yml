apiVersion: apps/v1
kind: Deployment
metadata:
  name: bankingapplication
spec:
  replicas: 7
  selector:
    matchLabels:
      app: bankingapplication
  template:
    metadata:
      labels:
        app: securitypatch 
    spec:
      containers:
        - name: securitypatch
          image: praveenhema/securitypatch:latest
          ports:
            - containerPort: 8081  # Your Node.js application should listen on port 3000

---

apiVersion: v1
kind: Service
metadata:
  name: securitypatch-service
spec:
  selector:
    app: securitypatch
  ports:
    - protocol: TCP
      port: 80  # You can use port 80 here for HTTP traffic
      targetPort: 8081  # This should match the port your Node.js application is running on (3000)
  type: Load balancer 
