apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-application
spec:
  replicas: 5
  selector:
    matchLabels:
      app: banking-application
  template:
    metadata:
      labels:
        app: newsecurity 
    spec:
      containers:
        - name: newupdate
          image: praveenhema/newupgrde:latest
          ports:
            - containerPort: 8081  # Your Node.js application should listen on port 3000

---

apiVersion: v1
kind: Service
metadata:
  name: newupadte-service
spec:
  selector:
    app: newupdate
  ports:
    - protocol: TCP
      port: 80  # You can use port 80 here for HTTP traffic
      targetPort: 8081  # This should match the port your Node.js application is running on (3000)
  type: Load balancer 
